name: CI

on:
  push:
    branches:
      - main
      - dev/**
      - feature/**
    paths-ignore:
      - "data/**"
      - "examples/**"

  pull_request:
    branches:
      - main
    paths-ignore:
      - "data/**"
      - "examples/**"

jobs:
  test:
    name: Julia ${{ matrix.version }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      actions: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        # No "pre": JET tracks compiler internals and has no release compatible
        # with Julia pre-releases, so a "pre" entry fails at dependency
        # resolution and never tests the package.
        version:
          - "1.12"   # minimum supported version (the [compat] floor)
          - "1"      # latest stable release
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.version }}
          arch: x64
      - uses: julia-actions/cache@v2
      - name: Update registry
        run: julia -e 'using Pkg; Pkg.Registry.update()'
      - uses: julia-actions/julia-runtest@v1

  # No downgrade-compat job: julia-downgrade-compat also rewrites test/Project.toml
  # and pins TestItemRunner to its floor (1.0.0), which hard-requires the old
  # TestItems 0.1 — an empty intersection with TestItems = "1" that its `skip`
  # input does not prevent. The package's own runtime-dep floors are light and
  # were verified to resolve and pass at their lower bounds, and Aqua's
  # deps_compat check (in the test job) already validates the bounds are
  # well-formed. See CI_SETUP.md for the rationale.
